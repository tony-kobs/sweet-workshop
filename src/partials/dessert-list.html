<section
  class="dessert-list-section"
  id="dessert-list-section"
  data-aos="fade-up"
>
  <div class="container">
    <div class="desert-top-row">
      <div class="dessert-title-wrapper">
        <h2
          class="dessert-list-title"
          data-aos="fade-right"
          data-aos-delay="200"
        >
          Солодощі
        </h2>
        <p
          class="dessert-list-subtitle"
          data-aos="fade-left"
          data-aos-delay="400"
        >
          Спробуйте наші смачні десерти, які вас здивують!
        </p>
      </div>
      <div
        class="dessert-list-category-desktop"
        id="category-desktop"
        data-aos="fade-up"
        data-aos-delay="600"
      ></div>
      <div class="dessert-list-category-mobile">
        <div id="category-mobile" data-aos="fade-up" data-aos-delay="600"></div>
      </div>
    </div>
    <span class="loader hidden" id="loader"></span>
    <div class="dessert-list-wrapper" data-aos="fade-up" data-aos-delay="800">
      <ul class="dessert-list" id="dessert-list"></ul>
    </div>
    <div class="dessert-list-button-container">
      <button class="js-load-more load-more-hidden" id="load-more-btn">
        Завантажити ще
      </button>
    </div>
  </div>
</section>
